<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 五大联赛数据中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a0e1a,#1a1f35);color:#fff;min-height:100vh}
.header{background:rgba(0,0,0,0.5);padding:25px 20px;text-align:center;border-bottom:2px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
.header h1{font-size:1.8em;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:15px}
.tab{padding:10px 18px;border-radius:25px;border:2px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;font-size:14px;transition:all 0.3s;white-space:nowrap}
.tab:hover,.tab.active{background:linear-gradient(135deg,#00d2ff,#3a7bd5);border-color:transparent}
.container{max-width:1400px;margin:0 auto;padding:20px}
.controls{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;align-items:center}
.controls input,.controls select{padding:12px 20px;border-radius:30px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:14px;outline:none}
.controls input{flex:1;min-width:200px}
.controls input:focus,.controls select:focus{border-color:#00d2ff}
.controls select option{background:#1a1f35;color:#fff}
.refresh-btn{padding:12px 25px;border-radius:30px;border:none;background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff;cursor:pointer;font-weight:bold;font-size:14px}
.auto-badge{padding:10px 18px;border-radius:30px;background:rgba(0,210,255,0.15);border:1px solid rgba(0,210,255,0.3);font-size:13px;color:#00d2ff;display:flex;align-items:center;gap:8px}
.pulse{width:10px;height:10px;border-radius:50%;background:#00d2ff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.stats-bar{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:25px}
.stat-card{flex:1;min-width:100px;padding:15px;border-radius:15px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);text-align:center}
.stat-value{font-size:1.8em;font-weight:bold;color:#00d2ff}
.stat-label{font-size:0.8em;color:#888;margin-top:5px}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.player-card{background:rgba(255,255,255,0.03);border-radius:15px;padding:20px;border:1px solid rgba(255,255,255,0.1);transition:all 0.3s;position:relative;overflow:hidden}
.player-card:hover{transform:translateY(-5px);border-color:rgba(0,210,255,0.3);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);opacity:0;transition:opacity 0.3s}
.player-card:hover::before{opacity:1}
.player-name{font-size:1.2em;font-weight:bold;margin-bottom:3px}
.player-sub{color:#aaa;font-size:0.9em;margin-bottom:10px}
.player-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.stat-item{background:rgba(255,255,255,0.05);padding:8px 12px;border-radius:10px;text-align:center}
.stat-item .val{font-size:1.3em;font-weight:bold;color:#00d2ff}
.stat-item .lbl{font-size:0.7em;color:#888;margin-top:2px}
.player-info{display:flex;justify-content:space-between;align-items:center;margin-top:10px;color:#aaa;font-size:0.85em}
.position-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.75em;background:rgba(0,210,255,0.2);color:#00d2ff}
.loading{text-align:center;padding:60px;color:#aaa}
.loading .spinner{width:40px;height:40px;border:3px solid rgba(0,210,255,0.2);border-top-color:#00d2ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px;color:#e17055}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;overflow-y:auto;padding:20px}
.modal.active{display:block}
.modal-content{max-width:800px;margin:20px auto;background:#1a1f35;border-radius:20px;padding:25px;border:1px solid rgba(255,255,255,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:5px 10px}
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.squad-card{background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;text-align:center}
.squad-name{font-weight:bold;font-size:0.95em}
.squad-pos{color:#00d2ff;font-size:0.8em;margin:3px 0}
.squad-num{font-size:1.5em;font-weight:bold;color:#3a7bd5}
@media(max-width:600px){.player-grid{grid-template-columns:1fr}.header h1{font-size:1.2em}}
</style>
</head>
<body>

<div class="header">
    <h1>⚽ 五大联赛数据中心</h1>
    <p style="color:#aaa;margin-top:8px;">射手榜 · 球队阵容 · 实时更新</p>
</div>

<!-- 主标签 -->
<div class="tabs" id="mainTabs">
    <button class="tab active" onclick="switchMode('scorers')">🏆 射手榜</button>
    <button class="tab" onclick="switchMode('squads')">👥 球队阵容</button>
</div>

<!-- 联赛标签 -->
<div class="tabs" id="leagueTabs">
    <button class="tab active" onclick="switchLeague('PL')">🏴󠁧󠁢󠁥󠁮󠁧󠁿 英超</button>
    <button class="tab" onclick="switchLeague('PD')">🇪🇸 西甲</button>
    <button class="tab" onclick="switchLeague('BL1')">🇩🇪 德甲</button>
    <button class="tab" onclick="switchLeague('SA')">🇮🇹 意甲</button>
    <button class="tab" onclick="switchLeague('FL1')">🇫🇷 法甲</button>
</div>

<div class="container">
    <!-- 球队选择器（阵容模式显示） -->
    <div id="teamSelector" style="display:none;margin-bottom:20px;">
        <select id="teamSelect" onchange="loadSquad()" style="padding:12px 20px;border-radius:30px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:14px;outline:none;width:100%;max-width:400px;">
            <option value="">-- 选择球队 --</option>
        </select>
    </div>

    <!-- 搜索和刷新 -->
    <div class="controls">
        <input type="text" id="searchInput" placeholder="🔍 搜索球员..." oninput="renderCurrent()">
        <button class="refresh-btn" onclick="refreshCurrent()">🔄 刷新数据</button>
        <div class="auto-badge"><span class="pulse"></span>每5分钟自动更新</div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- 内容区 -->
    <div id="contentContainer"><div class="loading"><div class="spinner"></div>加载中...</div></div>
</div>

<!-- 阵容弹窗 -->
<div class="modal" id="squadModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">球队阵容</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="squad-grid" id="squadContent"></div>
    </div>
</div>

<script>
// ========== ⚠️ 这里填你的 API Key ==========
const API_KEY = '970903f014f14818884ba23554d6910b';
// =========================================

const LEAGUES = {
    'PL':  { name: '英超', code: 'PL',  flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', teams: {} },
    'PD':  { name: '西甲', code: 'PD',  flag: '🇪🇸', teams: {} },
    'BL1': { name: '德甲', code: 'BL1', flag: '🇩🇪', teams: {} },
    'SA':  { name: '意甲', code: 'SA',  flag: '🇮🇹', teams: {} },
    'FL1': { name: '法甲', code: 'FL1', flag: '🇫🇷', teams: {} }
};

let currentLeague = 'PL';
let currentMode = 'scorers'; // 'scorers' 或 'squads'
let scorersData = [];
let teamsData = {};
let currentSquad = [];

// 切换模式
function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    document.getElementById('teamSelector').style.display = mode === 'squads' ? 'block' : 'none';
    document.getElementById('statsBar').style.display = mode === 'scorers' ? 'flex' : 'none';
    
    if (mode === 'scorers') {
        loadScorers();
    } else {
        loadTeams();
    }
}

// 切换联赛
function switchLeague(code) {
    currentLeague = code;
    document.querySelectorAll('#leagueTabs .tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    if (currentMode === 'scorers') {
        loadScorers();
    } else {
        loadTeams();
    }
}

// 加载射手榜
async function loadScorers() {
    document.getElementById('contentContainer').innerHTML = '<div class="loading"><div class="spinner"></div>加载射手榜...</div>';
    
    try {
        const res = await fetch(`https://api.football-data.org/v4/competitions/${currentLeague}/scorers?limit=50`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!res.ok) throw new Error(res.status === 429 ? '请求太频繁，请稍后' : '获取失败');
        
        const data = await res.json();
        scorersData = data.scorers || [];
        updateStats();
        renderScorers();
    } catch(e) {
        document.getElementById('contentContainer').innerHTML = `<div class="error">❌ ${e.message}<br><button class="refresh-btn" style="margin-top:10px;" onclick="loadScorers()">🔄 重试</button></div>`;
    }
}

// 更新统计
function updateStats() {
    const total = scorersData.length;
    const totalGoals = scorersData.reduce((s,i) => s + (i.goals||0), 0);
    const totalAssists = scorersData.reduce((s,i) => s + (i.assists||0), 0);
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">上榜球员</div></div>
        <div class="stat-card"><div class="stat-value">${totalGoals}</div><div class="stat-label">总进球</div></div>
        <div class="stat-card"><div class="stat-value">${totalAssists}</div><div class="stat-label">总助攻</div></div>
        <div class="stat-card"><div class="stat-value">${LEAGUES[currentLeague].flag} ${LEAGUES[currentLeague].name}</div><div class="stat-label">当前联赛</div></div>
    `;
}

// 渲染射手榜
function renderScorers() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = scorersData.filter(i => {
        const n = i.player.name.toLowerCase();
        const t = i.team.shortName.toLowerCase();
        return !search || n.includes(search) || t.includes(search);
    });
    
    if (!filtered.length) {
        document.getElementById('contentContainer').innerHTML = '<div class="loading">😔 没有找到</div>';
        return;
    }
    
    document.getElementById('contentContainer').innerHTML = `
        <div class="player-grid">${filtered.map((i,idx) => `
            <div class="player-card">
                <div class="player-name">${i.player.name}</div>
                <div class="player-sub">🏟️ ${i.team.name}</div>
                <div class="player-stats">
                    <div class="stat-item"><div class="val">${i.goals||0}</div><div class="lbl">⚽ 进球</div></div>
                    <div class="stat-item"><div class="val">${i.assists||0}</div><div class="lbl">🎯 助攻</div></div>
                    <div class="stat-item"><div class="val">${i.playedMatches||0}</div><div class="lbl">📊 出场</div></div>
                    <div class="stat-item"><div class="val">${i.penalties||0}</div><div class="lbl">🎯 点球</div></div>
                </div>
                <div class="player-info">
                    <span>📍 ${i.player.nationality||'-'}</span>
                    <span>#${idx+1}</span>
                </div>
            </div>
        `).join('')}</div>`;
}

// 加载球队列表
async function loadTeams() {
    document.getElementById('contentContainer').innerHTML = '<div class="loading"><div class="spinner"></div>加载球队列表...</div>';
    
    try {
        const res = await fetch(`https://api.football-data.org/v4/competitions/${currentLeague}/teams`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!res.ok) throw new Error('获取球队失败');
        
        const data = await res.json();
        teamsData = data.teams || [];
        
        // 填充下拉框
        const select = document.getElementById('teamSelect');
        select.innerHTML = '<option value="">-- 选择球队 --</option>';
        teamsData.forEach(t => {
            select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
        
        renderTeams();
    } catch(e) {
        document.getElementById('contentContainer').innerHTML = `<div class="error">❌ ${e.message}<br><button class="refresh-btn" style="margin-top:10px;" onclick="loadTeams()">🔄 重试</button></div>`;
    }
}

// 渲染球队列表
function renderTeams() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = teamsData.filter(t => t.name.toLowerCase().includes(search));
    
    document.getElementById('contentContainer').innerHTML = `
        <div class="player-grid">${filtered.map(t => `
            <div class="player-card" onclick="loadSquad(${t.id},'${t.name}')" style="cursor:pointer;">
                <div class="player-name">${t.name}</div>
                <div class="player-sub">${t.venue || ''}</div>
                <div class="player-info">
                    <span>🏟️ ${t.venue || '未知主场'}</span>
                    <span class="position-badge">查看阵容 →</span>
                </div>
            </div>
        `).join('')}</div>`;
}

// 加载阵容
async function loadSquad(teamId, teamName) {
    if (!teamId) {
        teamId = document.getElementById('teamSelect').value;
        const select = document.getElementById('teamSelect');
        teamName = select.options[select.selectedIndex].text;
    }
    if (!teamId) return;
    
    document.getElementById('modalTitle').textContent = `👥 ${teamName} 阵容`;
    document.getElementById('squadContent').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    document.getElementById('squadModal').classList.add('active');
    
    try {
        const res = await fetch(`https://api.football-data.org/v4/teams/${teamId}`, {
            headers: { 'X-Auth-Token': API_KEY }
        });
        if (!res.ok) throw new Error('获取阵容失败');
        
        const data = await res.json();
        currentSquad = data.squad || [];
        renderSquad();
    } catch(e) {
        document.getElementById('squadContent').innerHTML = `<div class="error">❌ ${e.message}</div>`;
    }
}

// 渲染阵容
function renderSquad() {
    const coach = currentSquad.find(p => p.position === 'Coach');
    const players = currentSquad.filter(p => p.position !== 'Coach');
    
    document.getElementById('squadContent').innerHTML = `
        ${coach ? `<div style="text-align:center;margin-bottom:15px;padding:10px;background:rgba(255,255,255,0.05);border-radius:10px;">
            🧢 教练：<strong>${coach.name}</strong> | 国籍：${coach.nationality}
        </div>` : ''}
        ${players.map(p => `
            <div class="squad-card">
                <div class="squad-num">${p.shirtNumber || '-'}</div>
                <div class="squad-name">${p.name}</div>
                <div class="squad-pos">${p.position || '-'}</div>
                <div style="font-size:0.75em;color:#888;">🌍 ${p.nationality || '-'} | 🎂 ${p.dateOfBirth ? p.dateOfBirth.substring(0,4) : '-'}</div>
            </div>
        `).join('')}`;
}

function closeModal() {
    document.getElementById('squadModal').classList.remove('active');
}

// 当前渲染
function renderCurrent() {
    if (currentMode === 'scorers') renderScorers();
    else renderTeams();
}

function refreshCurrent() {
    if (currentMode === 'scorers') loadScorers();
    else loadTeams();
}

// 初始加载
loadScorers();

// 自动更新
setInterval(() => {
    if (currentMode === 'scorers') loadScorers();
}, 300000);
</script>
</body>
</html>
