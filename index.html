<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>рҹҸҶ дё–з•ҢжқҜж•°жҚ®дёӯеҝғ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a0020,#1a0035);color:#fff;min-height:100vh}
.header{background:rgba(0,0,0,0.6);padding:25px;text-align:center;border-bottom:3px solid rgba(255,215,0,0.3)}
.header h1{font-size:2em;background:linear-gradient(90deg,#FFD700,#FFA500,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{color:#aaa;margin-top:8px;font-size:0.9em}
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:15px;position:sticky;top:0;background:rgba(10,0,32,0.95);z-index:10;backdrop-filter:blur(10px)}
.tab{padding:10px 18px;border-radius:25px;border:2px solid rgba(255,215,0,0.3);background:transparent;color:#FFD700;cursor:pointer;font-size:14px;font-weight:bold;transition:all 0.3s}
.tab:hover,.tab.active{background:linear-gradient(135deg,#FFD700,#FF8C00);border-color:transparent;color:#000}
.container{max-width:1100px;margin:0 auto;padding:15px}
.controls{display:flex;gap:10px;margin-bottom:15px}
.controls input{padding:12px 18px;border-radius:25px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;flex:1}
.btn{padding:12px 22px;border-radius:25px;border:none;background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;cursor:pointer;font-weight:bold;font-size:14px}
.match-card{background:rgba(255,255,255,0.04);border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,0.08);margin-bottom:10px;transition:all 0.3s}
.match-card:hover{border-color:rgba(255,215,0,0.3);transform:translateX(3px)}
.match-meta{display:flex;justify-content:space-between;color:#888;font-size:0.75em;margin-bottom:8px}
.match-teams{display:flex;align-items:center;gap:12px}
.match-team{flex:1;display:flex;align-items:center;gap:8px;font-weight:bold}
.match-team.right{justify-content:flex-end;text-align:right}
.team-flag{font-size:1.8em}
.team-name{font-size:1em}
.match-score-box{text-align:center;min-width:70px}
.match-score{font-size:1.8em;font-weight:bold;color:#FFD700}
.match-time{font-size:0.75em;margin-top:3px}
.live-dot{display:inline-block;width:8px;height:8px;background:#e17055;border-radius:50%;animation:pulse 1.5s infinite;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.section-title{font-size:1.2em;margin:25px 0 12px;padding-bottom:8px;border-bottom:2px solid rgba(255,215,0,0.3);color:#FFD700;display:flex;align-items:center;gap:8px}
.standings-group{margin-bottom:25px}
.standings-group h3{color:#FFD700;margin-bottom:10px;font-size:1em}
table{width:100%;border-collapse:collapse;font-size:0.85em}
th{background:rgba(255,215,0,0.1);padding:8px 10px;text-align:left;font-size:0.8em;color:#FFD700}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05)}
.team-row td{padding:8px 10px}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.player-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.08);text-align:center}
.player-card:hover{border-color:rgba(255,215,0,0.3)}
.player-num{font-size:2em;font-weight:bold;color:#FFD700}
.player-name{font-weight:bold;font-size:0.9em;margin:5px 0}
.player-pos{color:#aaa;font-size:0.75em}
.player-nat{color:#888;font-size:0.7em}
.team-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.team-item{background:rgba(255,255,255,0.04);border-radius:12px;padding:15px;border:1px solid rgba(255,255,255,0.08);text-align:center;cursor:pointer;transition:all 0.3s}
.team-item:hover{border-color:rgba(255,215,0,0.5);transform:translateY(-2px)}
.team-item .flag{font-size:2.5em}
.team-item .name{font-weight:bold;margin-top:5px;font-size:0.85em}
.loading{text-align:center;padding:60px;color:#aaa}
.spinner{width:40px;height:40px;border:3px solid rgba(255,215,0,0.2);border-top-color:#FFD700;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 15px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:100;overflow-y:auto;padding:20px}
.modal.active{display:block}
.modal-content{max-width:800px;margin:20px auto;background:#1a0035;border-radius:20px;padding:20px;border:2px solid rgba(255,215,0,0.3)}
.modal-close{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;float:right;padding:5px 10px}
@media(max-width:600px){.team-name{font-size:0.8em}.match-score{font-size:1.3em}.player-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
    <h1>рҹҸҶ дё–з•ҢжқҜж•°жҚ®дёӯеҝғ</h1>
    <p class="subtitle">е®һж—¶жҜ”еҲҶ В· з§ҜеҲҶжҰң В· зҗғйҳҹйҳөе®№ В· зҗғе‘ҳдҝЎжҒҜ</p>
</div>

<div class="tabs" id="mainTabs">
    <button class="tab active" onclick="switchTab('matches')">рҹ“Ҡ жҜ”иөӣ</button>
    <button class="tab" onclick="switchTab('standings')">рҹ“Ӣ з§ҜеҲҶжҰң</button>
    <button class="tab" onclick="switchTab('teams')">рҹҢҚ зҗғйҳҹ</button>
</div>

<div class="container">
    <div class="controls">
        <input type="text" id="searchInput" placeholder="рҹ”Қ жҗңзҙў..." oninput="renderCurrent()">
        <button class="btn" onclick="refreshCurrent()">рҹ”„ еҲ·ж–°</button>
    </div>
    <div id="content"><div class="loading"><div class="spinner"></div>еҠ иҪҪдё–з•ҢжқҜж•°жҚ®...</div></div>
</div>

<div class="modal" id="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal()">вң•</button><div id="modalContent"></div></div></div>

<script>
const FLAGS = {
    'Argentina':'рҹҮҰрҹҮ·','Brazil':'рҹҮ§рҹҮ·','France':'рҹҮ«рҹҮ·','Germany':'рҹҮ©рҹҮӘ','England':'рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ',
    'Spain':'рҹҮӘрҹҮё','Italy':'рҹҮ®рҹҮ№','Netherlands':'рҹҮірҹҮұ','Portugal':'рҹҮөрҹҮ№','Belgium':'рҹҮ§рҹҮӘ',
    'Croatia':'рҹҮӯрҹҮ·','Uruguay':'рҹҮәрҹҮҫ','Mexico':'рҹҮІрҹҮҪ','United States':'рҹҮәрҹҮё','Japan':'рҹҮҜрҹҮө',
    'South Korea':'рҹҮ°рҹҮ·','Senegal':'рҹҮёрҹҮі','Morocco':'рҹҮІрҹҮҰ','Cameroon':'рҹҮЁрҹҮІ','Ghana':'рҹҮ¬рҹҮӯ',
    'Tunisia':'рҹҮ№рҹҮі','Nigeria':'рҹҮірҹҮ¬','Egypt':'рҹҮӘрҹҮ¬','Algeria':'рҹҮ©рҹҮҝ','South Africa':'рҹҮҝрҹҮҰ',
    'Australia':'рҹҮҰрҹҮә','New Zealand':'рҹҮірҹҮҝ','Iran':'рҹҮ®рҹҮ·','Saudi Arabia':'рҹҮёрҹҮҰ','Qatar':'рҹҮ¶рҹҮҰ',
    'Canada':'рҹҮЁрҹҮҰ','Costa Rica':'рҹҮЁрҹҮ·','Panama':'рҹҮөрҹҮҰ','Jamaica':'рҹҮҜрҹҮІ','Chile':'рҹҮЁрҹҮұ',
    'Colombia':'рҹҮЁрҹҮҙ','Peru':'рҹҮөрҹҮӘ','Ecuador':'рҹҮӘрҹҮЁ','Paraguay':'рҹҮөрҹҮҫ','Serbia':'рҹҮ·рҹҮё',
    'Switzerland':'рҹҮЁрҹҮӯ','Denmark':'рҹҮ©рҹҮ°','Sweden':'рҹҮёрҹҮӘ','Norway':'рҹҮірҹҮҙ','Poland':'рҹҮөрҹҮұ',
    'Ukraine':'рҹҮәрҹҮҰ','Austria':'рҹҮҰрҹҮ№','Hungary':'рҹҮӯрҹҮә','Turkey':'рҹҮ№рҹҮ·','Greece':'рҹҮ¬рҹҮ·',
    'Scotland':'рҹҸҙу Ғ§у Ғўу Ғіу ҒЈу Ғҙу Ғҝ','Wales':'рҹҸҙу Ғ§у Ғўу Ғ·у Ғ¬у Ғіу Ғҝ','Ireland':'рҹҮ®рҹҮӘ','China':'рҹҮЁрҹҮі','Russia':'рҹҮ·рҹҮә'
};

let curTab='matches',matches=[],standings=[],teamsData=[],allPlayers=[],playerCache={};

async function loadData(){
    try{
        // еҠ иҪҪжҜ”иөӣ
        const r1=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WWC/scoreboard');
        const d1=await r1.json();
        matches=d1.events||[];
        
        // еҠ иҪҪз§ҜеҲҶжҰң
        const r2=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WWC/standings');
        const d2=await r2.json();
        standings=d2.children||[];
        
        renderCurrent();
    }catch(e){
        document.getElementById('content').innerHTML='<div class="loading">вқҢ еҠ иҪҪеӨұиҙҘ: '+e.message+'<br><button class="btn" style="margin-top:15px" onclick="loadData()">рҹ”„ йҮҚиҜ•</button></div>';
    }
}

async function loadTeams(){
    document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div>еҠ иҪҪзҗғйҳҹ...</div>';
    try{
        const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WWC/teams');
        const d=await r.json();
        teamsData=(d.sports?.[0]?.leagues?.[0]?.teams||[]).map(t=>t.team);
        renderTeams();
    }catch(e){
        document.getElementById('content').innerHTML='<div class="loading">вқҢ еҠ иҪҪеӨұиҙҘ<br><button class="btn" style="margin-top:15px" onclick="loadTeams()">рҹ”„ йҮҚиҜ•</button></div>';
    }
}

async function loadTeamRoster(teamId,teamName){
    document.getElementById('modal').classList.add('active');
    document.getElementById('modalContent').innerHTML='<div class="loading"><div class="spinner"></div>еҠ иҪҪйҳөе®№...</div>';
    
    if(playerCache[teamId]){
        renderRoster(teamName,playerCache[teamId]);
        return;
    }
    
    try{
        const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/FIFA.WWC/teams/'+teamId+'/roster');
        const d=await r.json();
        const athletes=d.athletes||[];
        playerCache[teamId]=athletes;
        renderRoster(teamName,athletes);
    }catch(e){
        document.getElementById('modalContent').innerHTML='<div class="loading">вқҢ еҠ иҪҪеӨұиҙҘ</div>';
    }
}

function renderRoster(teamName,athletes){
    const groups={};
    athletes.forEach(a=>{
        const pos=a.position?.abbreviation||'?';
        if(!groups[pos])groups[pos]=[];
        groups[pos].push(a);
    });
    
    let html='<h2 style="color:#FFD700;margin-bottom:15px">'+teamName+' йҳөе®№ ('+athletes.length+'дәә)</h2>';
    
    const order=['GK','DF','MF','FW'];
    const posNames={GK:'рҹ§Ө й—Ёе°Ҷ',DF:'рҹӣЎпёҸ еҗҺеҚ«',MF:'рҹҺҜ дёӯеңә',FW:'вҡҪ еүҚй”Ӣ'};
    
    order.forEach(pos=>{
        if(!groups[pos])return;
        html+='<h4 style="color:#FFA500;margin:15px 0 8px">'+posNames[pos]+'</h4><div class="player-grid">';
        groups[pos].forEach(a=>{
            html+=`<div class="player-card">
                <div class="player-num">${a.jersey||'-'}</div>
                <div class="player-name">${a.fullName||a.displayName}</div>
                <div class="player-pos">${a.position?.displayName||pos}</div>
                <div class="player-nat">рҹҢҚ ${a.displayHeight||''} | ${a.age||''}еІҒ</div>
            </div>`;
        });
        html+='</div>';
    });
    
    document.getElementById('modalContent').innerHTML=html;
}

function renderMatches(){
    const s=document.getElementById('searchInput').value.toLowerCase();
    let list=matches;
    if(s)list=matches.filter(m=>{
        const h=m.competitions?.[0]?.competitors?.[0]?.team?.shortDisplayName?.toLowerCase()||'';
        const a=m.competitions?.[0]?.competitors?.[1]?.team?.shortDisplayName?.toLowerCase()||'';
        return h.includes(s)||a.includes(s);
    });
    
    const live=list.filter(m=>m.status?.type?.state==='in');
    const finished=list.filter(m=>m.status?.type?.state==='post');
    const upcoming=list.filter(m=>m.status?.type?.state==='pre');
    
    let html='';
    if(live.length)html+='<div class="section-title"><span class="live-dot"></span>иҝӣиЎҢдёӯ ('+live.length+')</div>'+live.map(buildMatch).join('');
    if(upcoming.length)html+='<div class="section-title">вҸ° еҚіе°ҶејҖе§Ӣ ('+upcoming.length+')</div>'+upcoming.slice(0,15).map(buildMatch).join('');
    if(finished.length)html+='<div class="section-title">вң… е·Із»“жқҹ ('+finished.length+')</div>'+finished.slice(-15).map(buildMatch).join('');
    
    document.getElementById('content').innerHTML=html||'<div class="loading">жҡӮж— жҜ”иөӣ</div>';
}

function buildMatch(m){
    const h=m.competitions?.[0]?.competitors?.[0];
    const a=m.competitions?.[0]?.competitors?.[1];
    if(!h||!a)return'';
    
    const hName=h.team.shortDisplayName||'?',aName=a.team.shortDisplayName||'?';
    const hFlag=FLAGS[hName]||'',aFlag=FLAGS[aName]||'';
    const group=m.group?.abbreviation||'';
    const d=new Date(m.date);
    const dateStr=d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    const timeStr=d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    const isLive=m.status?.type?.state==='in',isFinished=m.status?.type?.state==='post';
    const hScore=h.score?.displayValue||h.score||'0',aScore=a.score?.displayValue||a.score||'0';
    const venue=m.competitions?.[0]?.venue?.fullName||'';
    
    return `<div class="match-card">
        <div class="match-meta"><span>${group?'е°Ҹз»„'+group+' В· ':''}${venue}</span><span>${dateStr}</span></div>
        <div class="match-teams">
            <div class="match-team"><span class="team-flag">${hFlag}</span><span class="team-name">${hName}</span></div>
            <div class="match-score-box">
                <div class="match-score">${isFinished||isLive?hScore+'-'+aScore:'VS'}</div>
                <div class="match-time">${isLive?'<span style="color:#e17055">рҹ”ҙ '+m.status?.displayClock+'</span>':isFinished?'<span style="color:#888">е·Із»“жқҹ</span>':'<span style="color:#00b894">'+timeStr+'</span>'}</div>
            </div>
            <div class="match-team right"><span class="team-name">${aName}</span><span class="team-flag">${aFlag}</span></div>
        </div>
    </div>`;
}

function renderStandings(){
    if(!standings.length){document.getElementById('content').innerHTML='<div class="loading">жҡӮж— з§ҜеҲҶжҰң</div>';return;}
    let html='';
    standings.forEach(g=>{
        html+='<div class="standings-group"><h3>'+g.name+'</h3><table><thead><tr><th>#</th><th>зҗғйҳҹ</th><th>иөӣ</th><th>иғң</th><th>е№і</th><th>иҙҹ</th><th>иҝӣзҗғ</th><th>еӨұзҗғ</th><th>еҮҖиғң</th><th>з§ҜеҲҶ</th></tr></thead><tbody>';
        (g.standings?.entries||[]).forEach((t,i)=>{
            const s=t.stats||[];
            html+='<tr class="team-row"><td>'+(i+1)+'</td><td><b>'+(FLAGS[t.team.shortDisplayName]||'')+' '+t.team.shortDisplayName+'</b></td>';
            for(let j=0;j<4;j++)html+='<td>'+(s[j]?.displayValue||s[j]?.value||'-')+'</td>';
            html+='<td>'+(s[4]?.displayValue||s[4]?.value||'-')+'</td><td>'+(s[5]?.displayValue||s[5]?.value||'-')+'</td>';
            const gd=(s[8]?.value!==undefined)?s[8].value:'-';
            html+='<td style="color:'+(gd>0?'#00e676':gd<0?'#e17055':'#fff')+'">'+(gd>0?'+':'')+gd+'</td>';
            html+='<td style="font-weight:bold;color:#FFD700">'+(s[6]?.displayValue||s[6]?.value||'-')+'</td></tr>';
        });
        html+='</tbody></table></div>';
    });
    document.getElementById('content').innerHTML=html;
}

function renderTeams(){
    const s=document.getElementById('searchInput').value.toLowerCase();
    let list=teamsData;
    if(s)list=teamsData.filter(t=>(t.displayName||'').toLowerCase().includes(s)||(t.abbreviation||'').toLowerCase().includes(s));
    
    document.getElementById('content').innerHTML=list.length?`<div class="team-list">${list.map(t=>`
        <div class="team-item" onclick="loadTeamRoster('${t.id}','${(t.displayName||'').replace(/'/g,"\\'")}')">
            <div class="flag">${FLAGS[t.displayName]||'рҹҢҚ'}</div>
            <div class="name">${t.displayName}</div>
            <div style="color:#888;font-size:0.7em">${t.abbreviation||''}</div>
        </div>`).join('')}</div>`:'<div class="loading">жҡӮж— зҗғйҳҹж•°жҚ®</div>';
}

function switchTab(t){
    curTab=t;
    document.querySelectorAll('#mainTabs .tab').forEach(x=>x.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('searchInput').value='';
    if(t==='teams'&&!teamsData.length){loadTeams();return;}
    if(t==='standings'&&!standings.length){renderStandings();return;}
    renderCurrent();
}

function renderCurrent(){
    if(curTab==='matches')renderMatches();
    if(curTab==='standings')renderStandings();
    if(curTab==='teams')renderTeams();
}

function refreshCurrent(){
    document.getElementById('searchInput').value='';
    if(curTab==='matches'||curTab==='standings')loadData();
    if(curTab==='teams')loadTeams();
}

function closeModal(){document.getElementById('modal').classList.remove('active');}

loadData();
</script>
</body>
</html>
