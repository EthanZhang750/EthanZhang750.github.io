<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 球员数据中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0f1923;color:#fff;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a,#0d1b2a);padding:25px;text-align:center;border-bottom:2px solid #00d2ff}
.header h1{font-size:1.8em;color:#00d2ff}
.container{max-width:1200px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.card{background:rgba(255,255,255,0.04);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.08);text-align:center;transition:0.3s}
.card:hover{border-color:#00d2ff;transform:translateY(-4px)}
.card-name{font-size:1.2em;font-weight:bold;margin:5px 0}
.card-number{font-size:2.5em;font-weight:900;background:linear-gradient(135deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card-team{color:#aaa;font-size:0.85em;margin:5px 0}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.stat-box{background:rgba(255,255,255,0.05);padding:8px;border-radius:8px}
.stat-val{font-size:1.3em;font-weight:bold;color:#00d2ff}
.stat-lbl{font-size:0.7em;color:#888}
.status{display:inline-block;padding:5px 15px;border-radius:20px;font-size:0.8em;font-weight:bold;margin-top:8px}
.status-首发{background:#00b894;color:#fff}
.status-替补{background:#fdcb6e;color:#333}
.status-伤病{background:#e17055;color:#fff}
.status-停赛{background:#d63031;color:#fff}
.search-bar{padding:12px 20px;border-radius:30px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;width:100%;margin-bottom:20px;font-size:14px}
.search-bar:focus{border-color:#00d2ff;outline:none}
</style>
</head>
<body>
<div class="header"><h1>⚽ 球员数据中心</h1><p style="color:#aaa;margin-top:8px;">数据每日更新 · 五大联赛全覆盖</p ></div>
<div class="container">
    <input type="text" class="search-bar" id="search" placeholder="🔍 搜索球员或球队..." oninput="filter()">
    <div class="grid" id="grid"></div>
</div>

<script>
// 内嵌数据，无需任何 API
const PLAYERS = [
    {name:"Erling Haaland",number:9,position:"前锋",nation:"挪威",status:"首发",team:"曼城",age:24,goals:27,assists:5},
    {name:"Cole Palmer",number:20,position:"中场",nation:"英格兰",status:"首发",team:"切尔西",age:22,goals:22,assists:11},
    {name:"Alexander Isak",number:14,position:"前锋",nation:"瑞典",status:"首发",team:"纽卡斯尔",age:25,goals:21,assists:2},
    {name:"Ollie Watkins",number:11,position:"前锋",nation:"英格兰",status:"首发",team:"阿斯顿维拉",age:29,goals:19,assists:13},
    {name:"Mohamed Salah",number:11,position:"前锋",nation:"埃及",status:"首发",team:"利物浦",age:32,goals:18,assists:10},
    {name:"Bukayo Saka",number:7,position:"前锋",nation:"英格兰",status:"伤病",team:"阿森纳",age:23,goals:16,assists:9},
    {name:"Son Heung-min",number:7,position:"前锋",nation:"韩国",status:"首发",team:"热刺",age:32,goals:17,assists:10},
    {name:"Phil Foden",number:47,position:"中场",nation:"英格兰",status:"首发",team:"曼城",age:24,goals:19,assists:8},
    {name:"Bruno Fernandes",number:8,position:"中场",nation:"葡萄牙",status:"首发",team:"曼联",age:30,goals:10,assists:8},
    {name:"Kevin De Bruyne",number:17,position:"中场",nation:"比利时",status:"伤病",team:"曼城",age:33,goals:4,assists:10},
    {name:"Kylian Mbappé",number:9,position:"前锋",nation:"法国",status:"首发",team:"巴黎圣日耳曼",age:26,goals:27,assists:7},
    {name:"Jude Bellingham",number:5,position:"中场",nation:"英格兰",status:"首发",team:"皇家马德里",age:21,goals:19,assists:6},
    {name:"Harry Kane",number:9,position:"前锋",nation:"英格兰",status:"首发",team:"拜仁慕尼黑",age:31,goals:36,assists:8},
    {name:"Lautaro Martinez",number:10,position:"前锋",nation:"阿根廷",status:"首发",team:"国际米兰",age:27,goals:24,assists:3},
    {name:"Vinicius Jr",number:7,position:"前锋",nation:"巴西",status:"首发",team:"皇家马德里",age:24,goals:15,assists:6}
];

function render(data){
    document.getElementById('grid').innerHTML = data.map(p=>`
        <div class="card">
            <div class="card-number">${p.number}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-team">🏟️ ${p.team}</div>
            <div class="stats">
                <div class="stat-box"><div class="stat-val">${p.goals}</div><div class="stat-lbl">⚽ 进球</div></div>
                <div class="stat-box"><div class="stat-val">${p.assists}</div><div class="stat-lbl">🎯 助攻</div></div>
            </div>
            <div style="color:#aaa;font-size:0.8em;">📍 ${p.position} | 🌍 ${p.nation} | 🎂 ${p.age}岁</div>
            <span class="status status-${p.status}">${p.status}</span>
        </div>
    `).join('');
}

function filter(){
    const s = document.getElementById('search').value.toLowerCase();
    const filtered = PLAYERS.filter(p => !s || p.name.toLowerCase().includes(s) || p.team.toLowerCase().includes(s));
    render(filtered);
}

render(PLAYERS);
</script>
</body>
</html>
